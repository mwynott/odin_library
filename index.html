<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odin-Library</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <h1>Odin-Library</h1>
    <p>Welcome to the Odin Library! You can add books, remove books, and display the list of books in your library.</p>
    <button id="add-book-btn">Add New Book</button>
    <div id="book-list">
        <table>
            <thead>
                <tr>
                    <th scope="col">Title</th>
                    <th scope="col">Author</th>
                    <th scope="col">Pages</th>
                    <th scope="col">Read</th>
                    <th scope="col">ID</th>
                </tr>
            </thead>
            <tbody id="booklist-body">
                <!-- Book entries here -->
            </tbody>
        </table>
    </div>
</body>
</html>
