<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odin-Library</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <h1>Odin-Library</h1>
    <p>Welcome to the Odin Library! You can add books, remove books, and display the list of books in your library.</p>
    <button id="add-book-btn">Add New Book</button>
        <div id="book-form-container" style="display: none; margin-top: 1rem;">
            <form id="add-book-form">
                <label for="title">Title:</label>
                <input type="text" id="title" name="title" required>

                <label for="author">Author:</label>
                <input type="text" id="author" name="author" required>

                <label for="pages">Pages:</label>
                <input type="number" id="pages" name="pages" min="1">

                <label for="isread">Read:</label>
                <input type="checkbox" id="isread" name="isread">

                <button type="submit">Add Book</button>
                <button type="button" id="cancel-btn">Cancel</button>
            </form>
        </div>
    
    <div id="book-list">
        <table id="libraryTable">
            <tbody id="book-list-body">
                <!-- Book entries here -->
            </tbody>
        </table>
    </div>
</body>
</html>
